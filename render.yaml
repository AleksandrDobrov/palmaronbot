services:
  - type: web
    name: palamron-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PORT
        value: 10000
      - key: WEBAPP_URL
        sync: false
    autoDeploy: true
