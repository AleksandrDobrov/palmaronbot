<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Уведомления - INVESTING PALMARON BOT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <header class="app-header">
            <a href="/" class="back-button">← Назад</a>
            <h1 class="page-title">💬 Уведомления</h1>
            <button class="mark-all-read-btn" id="markAllReadBtn" style="margin-left: auto; background: none; border: none; color: var(--accent); font-size: 14px; padding: 8px;">Прочитати всі</button>
        </header>

        <!-- Контент - чат стиль -->
        <main class="main-content" style="padding: 0; height: calc(100vh - 80px); display: flex; flex-direction: column;">
            <!-- Список уведомлений в стиле чата -->
            <div id="notificationsList" class="chat-notifications-list" style="flex: 1; overflow-y: auto; padding: 16px;">
                <div class="loading-message" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                    <div style="font-size: 48px; margin-bottom: 16px;">⏳</div>
                    <div>Завантаження...</div>
                </div>
            </div>

            <!-- Пустое состояние -->
            <div id="emptyState" class="empty-state" style="display: none; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;">
                <div class="empty-icon" style="font-size: 80px; margin-bottom: 24px; opacity: 0.5;">📭</div>
                <h2 style="font-size: 20px; margin-bottom: 8px; color: var(--text-primary);">Немає уведомлень</h2>
                <p style="color: var(--text-secondary); font-size: 14px;">Тут будуть відображатися всі ваші уведомлення</p>
            </div>
        </main>

        <!-- Техподдержка - плавающая кнопка -->
        <div class="support-button" id="supportButton" onclick="openSupport()">
            <div class="support-icon">💬</div>
            <div class="support-badge" id="supportBadge" style="display: none;">1</div>
        </div>

        <!-- Модальное окно для просмотра уведомления -->
        <div id="notificationModal" class="notification-modal" style="display: none;">
            <div class="modal-overlay" onclick="closeNotificationModal()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Уведомление</h2>
                    <button class="modal-close" onclick="closeNotificationModal()">×</button>
                </div>
                <div class="modal-body">
                    <div id="modalIcon" style="font-size: 64px; text-align: center; margin-bottom: 20px;"></div>
                    <div id="modalMessage" style="font-size: 16px; line-height: 1.6; color: var(--text-primary);"></div>
                    <div id="modalDate" style="font-size: 12px; color: var(--text-secondary); margin-top: 20px; text-align: center;"></div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn" onclick="markCurrentAsRead()">Відмітити як прочитане</button>
                    <button class="modal-btn modal-btn-danger" onclick="deleteCurrentNotification()">Видалити</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно техподдержки -->
        <div id="supportModal" class="notification-modal" style="display: none;">
            <div class="modal-overlay" onclick="closeSupportModal()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>💬 Тех. Підримка</h2>
                    <button class="modal-close" onclick="closeSupportModal()">×</button>
                </div>
                <div class="modal-body">
                    <p style="margin-bottom: 20px; color: var(--text-secondary);">Зв'яжіться з адміністраторами для отримання допомоги:</p>
                    <div class="support-chat" id="supportChat" style="max-height: 400px; overflow-y: auto; margin-bottom: 20px;">
                        <!-- Сообщения техподдержки будут здесь -->
                    </div>
                    <div class="support-input-container">
                        <input type="text" id="supportMessageInput" placeholder="Напишіть ваше повідомлення..." 
                               onkeypress="if(event.key === 'Enter') sendSupportMessage()"
                               style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-size: 14px;">
                        <button onclick="sendSupportMessage()" class="send-support-btn">Відправити</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/telegram-webapp.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script>
        const api = new API();
        let currentNotificationId = null;
        
        let isLoading = false;
        
        async function loadNotifications() {
            if (isLoading) {
                console.log('[Notifications] Already loading, skipping...');
                return;
            }
            
            isLoading = true;
            const list = document.getElementById('notificationsList');
            const emptyState = document.getElementById('emptyState');
            
            try {
                console.log('[Notifications] Loading notifications...');
                const data = await api.getNotifications(false, 100);
                console.log('[Notifications] Received data:', data);
                
                const notifications = data.notifications || [];
                
                if (notifications.length === 0) {
                    list.style.display = 'none';
                    emptyState.style.display = 'flex';
                    isLoading = false;
                    return;
                }
                
                list.style.display = 'block';
                emptyState.style.display = 'none';
                
                // Группируем по датам
                const grouped = groupNotificationsByDate(notifications);
                
                list.innerHTML = Object.keys(grouped).map(date => {
                    const dateNotifications = grouped[date];
                    return `
                        <div class="date-group">
                            <div class="date-divider">${formatDateHeader(date)}</div>
                            ${dateNotifications.map(notif => renderNotification(notif)).join('')}
                        </div>
                    `;
                }).join('');
                
                // Обновляем счетчик
                updateNotificationsBadge(data.unread_count || 0);
                console.log('[Notifications] Loaded successfully');
            } catch (error) {
                console.error('[Notifications] Error loading notifications:', error);
                list.innerHTML = `
                    <div class="error-message" style="text-align: center; padding: 40px; color: #f5576c;">
                        <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
                        <div>Помилка завантаження уведомлень</div>
                        <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">${error.message || 'Невідома помилка'}</div>
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }
        
        function groupNotificationsByDate(notifications) {
            const grouped = {};
            notifications.forEach(notif => {
                const date = new Date(notif.created_at * 1000);
                const dateKey = date.toDateString();
                if (!grouped[dateKey]) {
                    grouped[dateKey] = [];
                }
                grouped[dateKey].push(notif);
            });
            return grouped;
        }
        
        function formatDateHeader(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === today.toDateString()) {
                return 'Сьогодні';
            } else if (date.toDateString() === yesterday.toDateString()) {
                return 'Вчора';
            } else {
                return date.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' });
            }
        }
        
        function renderNotification(notif) {
            const date = new Date(notif.created_at * 1000);
            const timeStr = date.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
            
            const icons = {
                'balance_change': '💰',
                'deposit': '💵',
                'withdraw': '💸',
                'news': '📰',
                'promo': '🎁',
                'garden': '🌳',
                'info': 'ℹ️'
            };
            
            const icon = icons[notif.type] || '🔔';
            const isUnread = !notif.is_read;
            
            return `
                <div class="chat-message ${isUnread ? 'unread' : ''}" onclick="openNotification(${notif.id}, '${notif.title}', '${escapeHtml(notif.message)}', '${icon}', ${notif.created_at}, ${notif.is_read})">
                    <div class="message-avatar">${icon}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-title">${escapeHtml(notif.title)}</span>
                            <span class="message-time">${timeStr}</span>
                        </div>
                        <div class="message-text">${escapeHtml(notif.message)}</div>
                        ${isUnread ? '<div class="unread-indicator"></div>' : ''}
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openNotification(id, title, message, icon, createdAt, isRead) {
            currentNotificationId = id;
            const date = new Date(createdAt * 1000);
            const dateStr = date.toLocaleString('uk-UA', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalDate').textContent = dateStr;
            
            const modal = document.getElementById('notificationModal');
            modal.style.display = 'flex';
            
            // Отмечаем как прочитанное при открытии
            if (!isRead) {
                markAsRead(id);
            }
        }
        
        function closeNotificationModal() {
            document.getElementById('notificationModal').style.display = 'none';
            currentNotificationId = null;
            loadNotifications(); // Обновляем список
        }
        
        function markCurrentAsRead() {
            if (currentNotificationId) {
                markAsRead(currentNotificationId);
                closeNotificationModal();
            }
        }
        
        function deleteCurrentNotification() {
            if (currentNotificationId) {
                deleteNotification(currentNotificationId);
                closeNotificationModal();
            }
        }
        
        async function markAsRead(notificationId) {
            try {
                await api.markNotificationRead(notificationId);
                loadNotifications();
            } catch (error) {
                console.error('Error marking as read:', error);
            }
        }
        
        async function deleteNotification(notificationId) {
            try {
                await api.deleteNotification(notificationId);
                loadNotifications();
            } catch (error) {
                console.error('Error deleting notification:', error);
            }
        }
        
        async function markAllAsRead() {
            try {
                await api.markAllNotificationsRead();
                loadNotifications();
            } catch (error) {
                console.error('Error marking all as read:', error);
            }
        }
        
        function updateNotificationsBadge(count) {
            const badge = document.getElementById('notificationsBadge');
            if (badge && badge.parentElement.id === 'notificationsIcon') {
                if (count > 0) {
                    badge.textContent = count > 99 ? '99+' : count;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }
        
        function openSupport() {
            document.getElementById('supportModal').style.display = 'flex';
            loadSupportMessages();
        }
        
        function closeSupportModal() {
            document.getElementById('supportModal').style.display = 'none';
        }
        
        function loadSupportMessages() {
            // Загрузка сообщений техподдержки (можно реализовать позже)
            const chat = document.getElementById('supportChat');
            chat.innerHTML = `
                <div class="support-message admin">
                    <div class="support-avatar">👨‍💼</div>
                    <div class="support-text">Привіт! Якщо у вас є питання або потрібна допомога, напишіть нам!</div>
                </div>
            `;
        }
        
        function sendSupportMessage() {
            const input = document.getElementById('supportMessageInput');
            const message = input.value.trim();
            if (!message) return;
            
            const chat = document.getElementById('supportChat');
            chat.innerHTML += `
                <div class="support-message user">
                    <div class="support-text">${escapeHtml(message)}</div>
                    <div class="support-avatar">👤</div>
                </div>
            `;
            
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            
            // Здесь можно отправить сообщение на сервер
            // await api.sendSupportMessage(message);
        }
        
        document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);
        
        // Загружаем уведомления при загрузке страницы
        loadNotifications();
        
        // Обновляем каждые 30 секунд
        setInterval(loadNotifications, 30000);
    </script>
    <script src="{{ url_for('static', filename='js/snowflakes.js') }}"></script>
</body>
</html>
